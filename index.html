<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QS Quote Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy:    #011648;
  --blue:    #2563eb;
  --blue2:   #3b82f6;
  --green:   #059669;
  --amber:   #d97706;
  --red:     #dc2626;
  --bg:      #f0f4fa;
  --surface: #ffffff;
  --surface2:#f8fafc;
  --surface3:#f1f5f9;
  --border:  rgba(15,23,42,0.09);
  --border2: rgba(15,23,42,0.15);
  --text:    #0f172a;
  --text2:   #334155;
  --text3:   #64748b;
  --r:       12px;
  --rs:      8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* NAV */
nav{background:#fff;border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(15,23,42,.06);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:16px;font-weight:600;letter-spacing:-.03em;color:var(--text);display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tag{font-size:11px;font-weight:500;color:var(--text3);background:var(--surface3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;cursor:pointer}
.nav-tag:hover{border-color:var(--blue);color:var(--blue)}
.btn-new{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
.btn-new:hover{background:var(--blue2)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 58px)}

/* SIDEBAR */
.sidebar{background:#f8fafc;border-right:1px solid var(--border);padding:20px 0;overflow-y:auto;position:sticky;top:58px;height:calc(100vh - 58px)}
.sidebar-section{padding:0 16px;margin-bottom:24px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:8px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:12px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.stat-box .val{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.03em;font-family:'DM Mono',monospace}
.stat-box .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.stat-box.blue .val{color:var(--blue)}
.stat-box.green .val{color:var(--green)}
.stat-box.amber .val{color:var(--amber)}
.filter-group{margin-bottom:16px}
.filter-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;padding:0 8px}
.filter-input,.filter-select{width:100%;background:#fff;border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s}
.filter-input:focus,.filter-select:focus{border-color:var(--blue)}
.quote-list{}
.qi{padding:12px 10px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .15s}
.qi:hover{background:#fff;border-color:var(--border2)}
.qi.active{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.25)}
.qi-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.qi-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.qi-amount{font-family:'DM Mono',monospace;font-size:12px;color:var(--green)}
.qi-addr{font-size:11px;color:var(--text3)}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;display:inline-block}
.b-draft{background:rgba(100,116,139,.12);color:var(--text3)}
.b-sent{background:rgba(37,99,235,.12);color:var(--blue)}
.b-accepted{background:rgba(5,150,105,.12);color:var(--green)}
.b-declined{background:rgba(220,38,38,.12);color:var(--red)}
.qi-by{font-size:10px;color:var(--text3)}

/* MAIN */
.main{padding:28px;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-state h3{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:13px;max-width:300px}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.card h2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-.02em}
.card .sub{font-size:12px;color:var(--text3);margin-bottom:20px}

/* FORM */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid1{display:grid;grid-template-columns:1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.02em}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);background:#fff}
.field .hint{font-size:11px;color:var(--text3);margin-top:2px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title span{background:var(--blue);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px}

/* ROOMS */
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.room-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:8px}
.room-icon{font-size:16px}
.room-name{font-size:13px;color:var(--text2);flex:1}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;background:#fff;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;line-height:1}
.qty-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff}
.qty-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);width:24px;text-align:center}

/* FIXED COSTS */
.fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fc-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text2)}
.fc-item input[type=checkbox]{accent-color:var(--blue);width:15px;height:15px;cursor:pointer}
.fc-item .fc-name{flex:1}
.fc-item .fc-amt{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* DETAIL HEADER */
.detail-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px}
.detail-hdr h1{font-size:22px;font-weight:600;letter-spacing:-.03em}
.detail-hdr .meta{font-size:12px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace}
.detail-actions{display:flex;gap:8px;flex-shrink:0}

/* PREVIEW */
.preview-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.line-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.line-item:last-child{border-bottom:none}
.item-name{color:var(--text2)}
.item-detail{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.item-price{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);font-weight:500}
.total-box{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.18);border-radius:var(--rs);margin-top:8px}
.total-label{font-size:14px;font-weight:600;color:var(--text)}
.total-amount{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;color:var(--blue);letter-spacing:-.03em}

/* RATES */
.rates-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rate-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:10px}
.rate-icon{font-size:18px}
.rate-name{font-size:13px;color:var(--text2);flex:1}
.rate-input-wrap{display:flex;align-items:center;gap:4px}
.rate-prefix{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.rate-item input{background:#fff;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:5px 8px;width:90px;outline:none;text-align:right}
.rate-item input:focus{border-color:var(--blue)}

/* HISTORY TABLE */
.history-table{width:100%;border-collapse:collapse;font-size:13px}
.history-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border2);background:var(--surface2)}
.history-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.history-table tr:last-child td{border-bottom:none}
.history-table tr:hover td{background:var(--surface2)}
.mono{font-family:'DM Mono',monospace;color:var(--text)}
.amount{font-family:'DM Mono',monospace;color:var(--green);font-weight:500}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-navy{background:var(--navy);color:#fff;border:none}
.btn-navy:hover{opacity:.9}
.btn-danger{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:var(--red)}
.btn-danger:hover{background:rgba(220,38,38,.15)}
.actions-row{display:flex;gap:10px;flex-wrap:wrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border:1px solid var(--border2);border-radius:var(--r);padding:28px 32px;width:360px;box-shadow:0 20px 60px rgba(15,23,42,.15);transform:scale(.96);transition:transform .2s}
.overlay.show .modal{transform:scale(1)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.modal p{font-size:13px;color:var(--text3);margin-bottom:20px}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;margin-bottom:14px}
.modal input:focus{border-color:var(--blue);background:#fff}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:12px 18px;font-size:13px;color:#f1f5f9;z-index:9999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}

/* RESPONSIVE */
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}.rooms-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){nav{padding:0 16px}.main{padding:16px}.grid2{grid-template-columns:1fr}.rooms-grid{grid-template-columns:1fr}.rates-grid{grid-template-columns:1fr}.fc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">🏗</div>
    QS Quote Tool
  </div>
  <div class="nav-right">
    <span class="nav-tag" id="user-tag" onclick="changeUser()">—</span>
    <button class="btn-new" onclick="newQuote()">+ New Quote</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Overview</div>
      <div class="stat-row">
        <div class="stat-box blue"><div class="val" id="stat-total">0</div><div class="lbl">Total Quotes</div></div>
        <div class="stat-box green"><div class="val" id="stat-accepted">0</div><div class="lbl">Accepted</div></div>
      </div>
      <div class="stat-row">
        <div class="stat-box amber"><div class="val" id="stat-sent">0</div><div class="lbl">Sent</div></div>
        <div class="stat-box"><div class="val" id="stat-value">$0</div><div class="lbl">Total Value</div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Filter</div>
      <div class="filter-group">
        <div class="filter-label">Search</div>
        <input class="filter-input" id="search-input" placeholder="Client name..." oninput="renderList()">
      </div>
      <div class="filter-group">
        <div class="filter-label">Status</div>
        <select class="filter-select" id="status-filter" onchange="renderList()">
          <option value="">All Statuses</option>
          <option value="draft">Draft</option>
          <option value="sent">Sent</option>
          <option value="accepted">Accepted</option>
          <option value="declined">Declined</option>
        </select>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Quotes</div>
      <div class="quote-list" id="quote-list">
        <div style="font-size:12px;color:var(--text3);padding:8px">Loading...</div>
      </div>
    </div>
  </div>

  <div class="main" id="main-panel">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <h3>No quote selected</h3>
      <p>Create a new quote or select one from the list to get started.</p>
    </div>
  </div>
</div>

<!-- NAME MODAL -->
<div class="overlay" id="name-overlay">
  <div class="modal">
    <h3>👋 Welcome</h3>
    <p>Enter your name to start creating quotes. Saved with every quote you create.</p>
    <input type="text" id="name-input" placeholder="Your name..." onkeydown="if(event.key==='Enter')saveName()">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveName()">Continue</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://wljoyrwjculthelfgzth.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsam95cndqY3VsdGhlbGZnenRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODM1MTEsImV4cCI6MjA5MDE1OTUxMX0.8f3NV96YP9jOj__W9XiEDIiJ2gFlyBK53wnQJ1Tp6X0';

const ROOM_CONFIG = [
  {key:'bedroom', icon:'🛏', name:'Bedrooms'},
  {key:'bathroom',icon:'🚿', name:'Bathrooms'},
  {key:'ensuite', icon:'🛁', name:'Ensuites'},
  {key:'toilet',  icon:'🚽', name:'Toilets'},
  {key:'kitchen', icon:'🍳', name:'Kitchens'},
  {key:'living',  icon:'🛋', name:'Living Areas'},
  {key:'garage',  icon:'🚗', name:'Garages'},
  {key:'laundry', icon:'🧺', name:'Laundry'},
  {key:'study',   icon:'💻', name:'Study/Office'},
  {key:'outdoor', icon:'🌿', name:'Outdoor/Deck'},
];

const FIXED_COSTS = [
  {key:'site_setup',  name:'Site Setup & Prelims',     amount:8500},
  {key:'admin',       name:'Admin & Documentation',    amount:1500},
  {key:'council',     name:'Council Approvals (est.)', amount:4000},
  {key:'engineering', name:'Engineering & Certif.',    amount:3500},
];

const LOCATIONS = {
  metro:    {label:'Metro / City',     mult:1.00},
  regional: {label:'Regional',         mult:0.90},
  rural:    {label:'Rural / Remote',   mult:1.15},
  coastal:  {label:'Coastal Premium',  mult:1.10},
};

let DEFAULT_RATES = {
  base_per_m2:1800, bedroom:4500, bathroom:14000, ensuite:11000,
  toilet:3200, kitchen:22000, living:3500, garage:8500,
  laundry:4800, study:3000, outdoor:5500,
};

// ── STATE ──
let userName = localStorage.getItem('qs_user') || '';
let rates = JSON.parse(localStorage.getItem('qs_rates') || 'null') || DEFAULT_RATES;
let quotes = [];
let activeId = null;
let activeTab = 'form';
let saveTimer = null;

// ── SUPABASE ──
async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbUpsert(row) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/quotes', {
    method: 'POST',
    headers: {
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer':'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(row)
  });
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
}

async function sbDelete(id) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/quotes?id=eq.' + id, {
    method: 'DELETE',
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'}
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── INIT ──
window.onload = async function() {
  if (!userName) {
    showNameModal();
  } else {
    document.getElementById('user-tag').textContent = userName;
  }
  await loadQuotes();
};

async function loadQuotes() {
  try {
    quotes = await sbGet('quotes?order=created_at.desc');
    renderList();
    updateStats();
  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('quote-list').innerHTML = '<div style="font-size:12px;color:var(--red);padding:8px">⚠️ Could not load. Check connection.</div>';
    quotes = [];
    renderList();
    updateStats();
  }
}

// ── NAME MODAL ──
function showNameModal() {
  document.getElementById('name-overlay').classList.add('show');
  setTimeout(function(){ document.getElementById('name-input').focus(); }, 200);
}

function changeUser() {
  document.getElementById('name-input').value = userName;
  showNameModal();
}

function saveName() {
  var val = document.getElementById('name-input').value.trim();
  if (!val) {
    document.getElementById('name-input').style.borderColor = '#dc2626';
    return;
  }
  userName = val;
  localStorage.setItem('qs_user', val);
  document.getElementById('user-tag').textContent = val;
  document.getElementById('name-overlay').classList.remove('show');
  showToast('Welcome, ' + val + '!', 'success');
}

// ── NEW QUOTE ──
function newQuote() {
  if (!userName) { showNameModal(); return; }
  var id = Date.now().toString();
  var q = {
    id: id,
    client: '',
    address: '',
    contact: '',
    email: '',
    notes: '',
    floor_area: 0,
    rooms: {bedroom:3,bathroom:1,ensuite:1,toilet:1,kitchen:1,living:1,garage:1,laundry:1,study:0,outdoor:0},
    location: 'metro',
    fixed_costs: {site_setup:true,admin:true,council:true,engineering:true},
    status: 'draft',
    created_by: userName,
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };
  quotes.unshift(q);
  renderList();
  updateStats();
  openQuote(id);
  sbUpsert(q).then(function(){ showToast('Quote created ✓','success'); }).catch(function(e){ showToast('Save failed','error'); console.error(e); });
}

function openQuote(id) {
  activeId = id;
  activeTab = 'form';
  renderList();
  renderMain();
}

function getQ(id) {
  return quotes.find(function(q){ return q.id === id; });
}

// ── UPDATE QUOTE ──
function updateQuote(field, value) {
  var q = getQ(activeId);
  if (!q) return;
  if (field.indexOf('.') !== -1) {
    var parts = field.split('.');
    q[parts[0]][parts[1]] = value;
  } else {
    q[field] = value;
  }
  q.updated_at = new Date().toISOString();
  updateStats();
  var needsPreview = field === 'floor_area' || field.indexOf('rooms.') === 0 || field === 'location' || field.indexOf('fixed_costs.') === 0;
  if (needsPreview) updatePreview();
  if (field === 'client' || field === 'status') renderList();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    sbUpsert(q).catch(function(e){ console.error('Save err:', e); });
  }, 800);
}

function changeRoom(key, delta) {
  var q = getQ(activeId);
  if (!q) return;
  q.rooms[key] = Math.max(0, (q.rooms[key] || 0) + delta);
  q.updated_at = new Date().toISOString();
  document.getElementById('qty-' + key).textContent = q.rooms[key];
  updatePreview();
  updateStats();
  renderList();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    sbUpsert(q).catch(function(e){ console.error('Save err:', e); });
  }, 800);
}

function deleteQuote(id) {
  if (!confirm('Delete this quote?')) return;
  sbDelete(id).then(function(){
    quotes = quotes.filter(function(q){ return q.id !== id; });
    updateStats();
    renderList();
    if (activeId === id) { activeId = null; renderMain(); }
    showToast('Quote deleted','success');
  }).catch(function(){ showToast('Delete failed','error'); });
}

// ── CALC ──
function calcQuote(q) {
  var lines = [];
  var loc = LOCATIONS[q.location || 'metro'];
  var m = loc ? loc.mult : 1;
  if (q.floor_area > 0) {
    var a = q.floor_area * rates.base_per_m2 * m;
    lines.push({name:'Floor Area ('+q.floor_area+' m²)', detail:q.floor_area+' × $'+rates.base_per_m2.toLocaleString()+'/m²'+(m!==1?' × '+m+'x':''), amount:a, type:'base'});
  }
  ROOM_CONFIG.forEach(function(r){
    var qty = q.rooms[r.key] || 0;
    if (qty > 0) {
      var rate = rates[r.key] || 0;
      var amt = qty * rate * m;
      lines.push({name:r.name+' (×'+qty+')', detail:qty+' × $'+rate.toLocaleString()+(m!==1?' × '+m+'x':''), amount:amt, type:'room'});
    }
  });
  FIXED_COSTS.forEach(function(fc){
    if (q.fixed_costs && q.fixed_costs[fc.key]) {
      lines.push({name:fc.name, detail:'Fixed cost', amount:fc.amount, type:'fixed'});
    }
  });
  var subtotal = 0, fixedTotal = 0;
  lines.forEach(function(l){ if (l.type==='fixed') fixedTotal+=l.amount; else subtotal+=l.amount; });
  return {lines:lines, subtotal:subtotal, fixedTotal:fixedTotal, total:subtotal+fixedTotal, mult:m};
}

function fmtMoney(n) { return '$' + Math.round(n).toLocaleString(); }

// ── RENDER LIST ──
function renderList() {
  var search = (document.getElementById('search-input').value || '').toLowerCase();
  var statusF = document.getElementById('status-filter').value;
  var filtered = quotes.filter(function(q){
    var ms = !search || (q.client||'').toLowerCase().indexOf(search) !== -1 || (q.address||'').toLowerCase().indexOf(search) !== -1;
    var mst = !statusF || q.status === statusF;
    return ms && mst;
  });
  var el = document.getElementById('quote-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px">No quotes found</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(q){
    var c = calcQuote(q);
    var cap = q.status.charAt(0).toUpperCase() + q.status.slice(1);
    html += '<div class="qi' + (q.id === activeId ? ' active' : '') + '" onclick="openQuote(\'' + q.id + '\')">';
    html += '<div class="qi-name">' + (q.client || 'Unnamed Client') + '</div>';
    html += '<div class="qi-addr">' + (q.address || '—') + '</div>';
    html += '<div class="qi-row"><span class="badge b-' + q.status + '">' + cap + '</span><span class="qi-amount">' + fmtMoney(c.total) + '</span></div>';
    html += '<div style="text-align:right;margin-top:2px"><span class="qi-by">' + (q.created_by||'') + '</span></div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

// ── UPDATE STATS ──
function updateStats() {
  document.getElementById('stat-total').textContent = quotes.length;
  document.getElementById('stat-accepted').textContent = quotes.filter(function(q){ return q.status==='accepted'; }).length;
  document.getElementById('stat-sent').textContent = quotes.filter(function(q){ return q.status==='sent'; }).length;
  var tv = quotes.reduce(function(s,q){ return s + calcQuote(q).total; }, 0);
  var tvStr = tv >= 1000000 ? '$'+(tv/1000000).toFixed(1)+'M' : tv >= 1000 ? '$'+Math.round(tv/1000)+'k' : fmtMoney(tv);
  document.getElementById('stat-value').textContent = tvStr;
}

function renderPreviewInner(q) {

  h += '<span style="color:var(--text3)">Location: ' + locLabel + ' · Prepared by: ' + (q.created_by||'—') + ' · ' + dateStr + '</span>';
  h += '</div>';

  var buildLines = calc.lines.filter(function(l){ return l.type !== 'fixed'; });
  var fixedLines = calc.lines.filter(function(l){ return l.type === 'fixed'; });

  h += '<div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;margin-bottom:6px">BUILD COSTS</div>';
  h += '<div>';
  buildLines.forEach(function(l){
    h += '<div class="line-item"><div><div class="item-name">' + l.name + '</div><div class="item-detail">' + l.detail + '</div></div><div class="item-price">' + fmtMoney(l.amount) + '</div></div>';
  });
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)"><span>Build Subtotal</span><span style="font-family:\'DM Mono\',monospace">' + fmtMoney(calc.subtotal) + '</span></div>';

  if (fixedLines.length > 0) {
    h += '<div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;margin:14px 0 6px">FIXED COSTS</div>';
    h += '<div>';

      h += '<div class="line-item"><div class="item-name">' + l.name + '</div><div class="item-price">' + fmtMoney(l.amount) + '</div></div>';
    });

  }

    h += '</div>';

  h += '<div style="margin-top:10px;font-size:11px;color:var(--text3)">* Estimate only. Final pricing subject to site inspection and detailed scope. Rates assume ' + locLabel + ' location.</div>';
  return h;
}

// ── EXPORT ──
function quoteToRows(q) {
  var c = calcQuote(q);
  var rows = [
    ['SuperSub QS Quote Tool — Export'],[''],
    ['Client', q.client||''],['Address', q.address||''],
    ['Contact', q.contact||''],['Email', q.email||''],
    ['Status', q.status],['Created By', q.created_by||''],
    ['Date', new Date(q.created_at).toLocaleDateString('en-AU')],[''],
    ['ITEM','DETAIL','AMOUNT'],
  ];
  c.lines.forEach(function(l){ rows.push([l.name, l.detail, l.amount]); });
  rows.push([''],['TOTAL ESTIMATE','',c.total],[''],['Notes', q.notes||'']);
  return rows;
}

function exportCSV(id) {
  var q = getQ(id); if (!q) return;
  var rows = quoteToRows(q);
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  downloadFile(csv, 'quote-'+(q.client||'client').replace(/\s/g,'-')+'-'+q.id.slice(-6)+'.csv', 'text/csv');
  showToast('CSV downloaded ✓','success');
}

function exportAllCSV() {
  var rows = [['ID','Client','Address','Floor Area','Total','Status','Created By','Date']];
  quotes.forEach(function(q){ var c=calcQuote(q); rows.push([q.id.slice(-6),q.client||'',q.address||'',q.floor_area||0,c.total,q.status,q.created_by||'',new Date(q.created_at).toLocaleDateString('en-AU')]); });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  downloadFile(csv,'all-quotes-'+new Date().toISOString().slice(0,10)+'.csv','text/csv');
  showToast('All quotes exported ✓','success');
}

function buildXLS(rows) {
  var xmlRows = rows.map(function(r){ return '<Row>'+r.map(function(c){ return '<Cell><Data ss:Type="'+(typeof c==='number'?'Number':'String')+'">'+String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</Data></Cell>'; }).join('')+'</Row>'; }).join('');
  return '<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Quote"><Table>'+xmlRows+'</Table></Worksheet></Workbook>';
}

function exportExcel(id) {
  var q = getQ(id); if (!q) return;
  downloadFile(buildXLS(quoteToRows(q)),'quote-'+(q.client||'client').replace(/\s/g,'-')+'-'+q.id.slice(-6)+'.xls','application/vnd.ms-excel');
  showToast('Excel downloaded ✓','success');
}

function exportAllExcel() {
  var rows = [['ID','Client','Address','Floor Area (m²)','Total ($)','Status','Created By','Date']];
  quotes.forEach(function(q){ var c=calcQuote(q); rows.push([q.id.slice(-6),q.client||'',q.address||'',q.floor_area||0,c.total,q.status,q.created_by||'',new Date(q.created_at).toLocaleDateString('en-AU')]); });
  downloadFile(buildXLS(rows),'all-quotes-'+new Date().toISOString().slice(0,10)+'.xls','application/vnd.ms-excel');
  showToast('All quotes exported ✓','success');
}

function downloadFile(content, filename, mime) {
  var blob = new Blob([content],{type:mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// ── BRANDED PDF ──
function exportBrandedPDF(id) {
  var q = getQ(id);
  if (!q) return;
  if (!window.jspdf) { showToast('PDF library loading, try again','error'); return; }
  var calc = calcQuote(q);
  var doc = new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W = 210;
  var NAVY=[1,22,72], BLUE=[39,108,233], WHITE=[255,255,255], MIST=[240,244,253], MUTED=[120,135,160], LIGHT=[230,236,248];
  var fmt = function(n){ return '$'+Math.round(n).toLocaleString(); };
  var dateStr = new Date(q.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  var quoteId = 'EST-'+q.id.slice(-6).toUpperCase();
  var y = 0;

  // Header
  doc.setFillColor.apply(doc,NAVY); doc.rect(0,0,W,36,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor.apply(doc,WHITE);
  doc.text('Super',14,18);
  var sw = doc.getTextWidth('Super');
  doc.setTextColor.apply(doc,BLUE); doc.text('Sub',14+sw,18);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(180,195,220);
  doc.text('BUILD SMARTER. LIVE BETTER.',14,24);
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(180,195,220);
  doc.text('ESTIMATE',W-14,13,{align:'right'});
  doc.setFontSize(12); doc.setTextColor.apply(doc,WHITE);
  doc.text(quoteId,W-14,20,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(180,195,220);
  doc.text(dateStr,W-14,26,{align:'right'});

  // Blue bar
  doc.setFillColor.apply(doc,BLUE); doc.rect(0,36,W,2,'F');
  y = 38;

  // Client section
  doc.setFillColor.apply(doc,MIST); doc.rect(0,y,W,32,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor.apply(doc,MUTED);
  doc.text('PREPARED FOR',14,y+8);
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor.apply(doc,NAVY);
  doc.text(q.client||'Client',14,y+16);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor.apply(doc,MUTED);
  var cy = y+22;
  if (q.address) { doc.text(q.address,14,cy); cy+=5; }
  if (q.email)   { doc.text(q.email,14,cy); }
  var metaX = W-14, mY = y+9;
  var metas = [['Prepared by',q.created_by||'—'],['Location',(LOCATIONS[q.location||'metro']||{label:'Metro'}).label],['Floor Area',(q.floor_area||0)+' m²'],['Date',dateStr]];
  metas.forEach(function(m){
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor.apply(doc,MUTED);
    doc.text(m[0],metaX-28,mY,{align:'right'});
    doc.setFont('helvetica','normal'); doc.setTextColor.apply(doc,NAVY);
    doc.text(m[1],metaX,mY,{align:'right'});
    mY+=5.5;
  });
  y+=34;
  doc.setDrawColor.apply(doc,LIGHT); doc.setLineWidth(0.3); doc.line(0,y,W,y);
  y+=8;

  function secHeading(title) {
    doc.setFillColor.apply(doc,BLUE); doc.rect(14,y-1,2,7,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor.apply(doc,MUTED);
    doc.text(title.toUpperCase(),19,y+5);
    doc.setDrawColor.apply(doc,LIGHT); doc.setLineWidth(0.2); doc.line(14,y+7,W-14,y+7);
    y+=11;
  }
  function tblHeader() {
    doc.setFillColor(248,250,252); doc.rect(14,y,W-28,7,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor.apply(doc,MUTED);
    doc.text('ITEM',17,y+5); doc.text('CALCULATION',100,y+5); doc.text('AMOUNT',W-17,y+5,{align:'right'});
    doc.setDrawColor.apply(doc,LIGHT); doc.setLineWidth(0.2); doc.line(14,y+7,W-14,y+7);
    y+=9;
  }
  function tblRow(name,detail,amount,shade) {
    if (shade) { doc.setFillColor(252,253,255); doc.rect(14,y-1,W-28,8,'F'); }
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor.apply(doc,NAVY);
    doc.text(name,17,y+4);
    doc.setFontSize(7); doc.setTextColor.apply(doc,MUTED); doc.text(detail,100,y+4);
    doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor.apply(doc,NAVY);
    doc.text(fmt(amount),W-17,y+4,{align:'right'});
    doc.setDrawColor.apply(doc,LIGHT); doc.setLineWidth(0.15); doc.line(14,y+7,W-14,y+7);
    y+=8;
  }
  function subtotalRow(label,amount) {
    doc.setFillColor.apply(doc,MIST); doc.rect(14,y,W-28,8,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.setTextColor.apply(doc,MUTED); doc.text(label,W-55,y+5.5,{align:'right'});
    doc.setTextColor.apply(doc,NAVY); doc.text(fmt(amount),W-17,y+5.5,{align:'right'});
    y+=10;
  }

  // Build costs
  var buildLines = calc.lines.filter(function(l){ return l.type!=='fixed'; });
  var fixedLines = calc.lines.filter(function(l){ return l.type==='fixed'; });
  secHeading('Build Costs'); tblHeader();
  buildLines.forEach(function(l,i){ tblRow(l.name,l.detail,l.amount,i%2===1); });
  y+=1; subtotalRow('Build Subtotal',calc.subtotal); y+=4;

  if (fixedLines.length>0) {
    secHeading('Fixed Costs'); tblHeader();
    fixedLines.forEach(function(l,i){ tblRow(l.name,'Fixed cost',l.amount,i%2===1); });
    y+=1; subtotalRow('Fixed Subtotal',calc.fixedTotal); y+=4;
  }

  // Total box
  doc.setFillColor.apply(doc,NAVY); doc.roundedRect(14,y,W-28,18,3,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(180,195,220);
  doc.text('TOTAL ESTIMATE (INC. ALL COSTS)',20,y+7);
  doc.setFontSize(16); doc.setTextColor.apply(doc,WHITE);
  doc.text(fmt(calc.total),W-20,y+12,{align:'right'});
  y+=24;

  // Notes
  if (q.notes) {
    doc.setFillColor.apply(doc,MIST); doc.rect(14,y,W-28,16,'F');
    doc.setFillColor.apply(doc,BLUE); doc.rect(14,y,3,16,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor.apply(doc,MUTED);
    doc.text('NOTES',20,y+6);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor.apply(doc,NAVY);
    var noteLines = doc.splitTextToSize(q.notes,W-42);
    doc.text(noteLines,20,y+12);
    y+=20;
  }

  // Disclaimer
  y+=2;
  doc.setFillColor(248,249,252); doc.setDrawColor.apply(doc,LIGHT); doc.setLineWidth(0.2);
  doc.roundedRect(14,y,W-28,14,2,2,'FD');
  doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor.apply(doc,MUTED);
  var disc = 'This estimate is prepared based on assumed industry rates and specifications provided. All figures are indicative only and subject to change following site inspection, detailed scope confirmation, and final pricing. SuperSub accepts no liability for variations between this estimate and final contract pricing.';
  doc.text(doc.splitTextToSize(disc,W-36),17,y+5);
  y+=18;

  // Footer
  doc.setFillColor.apply(doc,NAVY); doc.rect(0,282,W,15,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor.apply(doc,WHITE);
  doc.text('SuperSub',14,289);
  doc.setFont('helvetica','normal'); doc.setTextColor(180,195,220);
  doc.text(' · supersub.co.nz · New Zealand\'s Modern Home Solution',14+doc.getTextWidth('SuperSub'),289);
  doc.setFontSize(7);
  doc.text('Estimate '+quoteId+' · Generated '+dateStr,W-14,289,{align:'right'});

  var fname = 'SuperSub-Quote-'+(q.client||'Client').replace(/\s+/g,'-')+'-'+quoteId+'.pdf';
  doc.save(fname);
  showToast('PDF downloaded ✓','success');
}

// ── TOAST ──
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type||'success') + ' show';
  setTimeout(function(){ el.classList.remove('show'); }, 2800);
}
</script>
</body>
</html>
